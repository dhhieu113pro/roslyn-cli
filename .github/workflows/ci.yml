name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: verify (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Test with 100% coverage gates
        run: python scripts/test-all.py

      - name: Test one-shot DNX execution
        run: >-
          dnx RoslynCli.Tool@0.1.0 --source artifacts/package --
          symbol search samples/SkillFixture/SkillFixture.slnx
          ProcessPaymentAsync --kind method --format json
